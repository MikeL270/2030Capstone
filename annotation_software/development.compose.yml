services:
  pronghorn-api-dev:
    build:
      context: .
      dockerfile: development.prongapi.containerfile
    environment:
      ORIGIN_URL: https://pronghorn-count-dev.arcc.uwyo.edu
      ROOT: ${ROOT}
      HERD_UNIT: ${HERD_UNIT}
      CROP_FOLDER: ${CROP_FOLDER}
      IMAGES: ${CROP_FOLDER}
      SECRET_KEY: ${SECRET_KEY}
      VALKEY_HOST: ${VALKEY_HOST}
      SESSION_REDIS: ${SESSION_REDIS}
      VALKEY_PASS: ${VALKEY_PASS}
      AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS} 
      DB_NAME: pronghorn_count_test
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      FLASK_APP: /app/app.py
    volumes:
      - ./annotation_api:/app:Z
      - ./requirements.txt:/app/requirements.txt:Z
      - ./crop_generator:/venv/crop_generator:Z
    command: > 
      /bin/bash -c "source /venv/api_env/bin/activate && python -u /app/app.py"
    networks: 
      - dev_pronghorn_app_network
  valkey:
    container_name: prong-valkey
    image: docker.io/valkey/valkey:8.1.1
    healthcheck:
      test: valkey-cli ping || exit 1
    restart: always
    command: valkey-server --requirepass ${VALKEY_PASS}
    networks: 
      - dev_pronghorn_app_network
  web-app-dev:
    build:
      context: .
      dockerfile: development.prongwebapp.containerfile  
    environment:
      API_URL: ${API_URL}
    volumes:
    - ./generator_web_app/src:/app/src:Z
    develop:
      watch:
        - path: ./generator_web_app/package.json
          target: /app/package.json
          action: restart
        - path: ./generator_web_app/vite.config.ts
          target: /app/vite.config.ts
          action: restart
    networks: 
      - dev_pronghorn_app_network
  dev-proxy:
    image: nginx:latest
    ports:
      - "443:443"
      - "80:80"
    networks:
      - dev_pronghorn_app_network
    volumes:
      - dev_nginx_conf:/etc/nginx/
      - nginx_certs:/etc/ssl/

  # Postgres database, uncomment if not using external database host
  # db:
  #   container_name: postgres_container
  #   image: postgres
  #   restart: always
  #   environment:
  #     POSTGRES_USER: root
  #     POSTGRES_PASSWORD: $(DB_ROOT_PASS)
  #     POSTGRES_DB: annotation_db
  #   volumes:
  #     - $(DB_STORAGE):/var/lib/postgresql/data
  #   networks:
  #     - pronghorn_app_network
  #   ports:
  #     - "5432:5432"
  #   user: "999:999"


volumes:
  dev_nginx_conf:
  nginx_certs:

networks: 
  dev_pronghorn_app_network:
    driver: bridge

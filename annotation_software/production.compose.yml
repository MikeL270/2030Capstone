services:
  pronghorn-api:
    build:
      context: .
      dockerfile: production.prongapi.containerfile
    environment:
      SECRET_KEY: "${SECRET_KEY}"
      VALKEY_HOST: "${VALKEY_HOST}"
      VALKEY_PASS: "${VALKEY_PASS}"
      AWS_ENDPOINT_URL_S3: "${AWS_ENDPOINT_URL_S3}"
      DB_HOST: "${DB_HOST}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASS}" 
      DB_NAME: "${DB_NAME}"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ${DATA_PATH}:/data
    ports:
      - "8000:8000"
    networks: 
      - pronghorn_app_network 
  valkey:
    container_name: prong-valkey
    image: docker.io/valkey/valkey:8.1.1
    mem_limit: 256M
    cpus: 0.25
    healthcheck:
      test: valkey-cli ping || exit 1
    restart: always
    ports:
      - "6379:6379"
    command: valkey-server --requirepass ${VALKEY_PASS}
    networks: 
      - pronghorn_app_network 
  web-app:
    build:
      context: .
      dockerfile: production.prongwebapp.containerfile
    ports:
      - "6900:6900"
    networks: 
      - pronghorn_app_network

  # Postgres database, uncomment if not using external database host
  # db:

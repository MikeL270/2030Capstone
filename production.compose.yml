services:
  spicedb:
    container_name: prong_spicedb
    image: authzed/spicedb:latest
    environment:
      SPICEDB_GRPC_LOGLEVEL: ${SPICEDB_GRPC_LOGLEVEL}
      SPICEDB_DATASTORE_ENGINE: ${SPICEDB_DATASTORE_ENGINE}
      SPICEDB_DATASTORE_CONN_URI: ${SPICEDB_DATASTORE_CONN_URI}
      SPICEDB_GRPC_PRESHARED_KEY: ${SPICEDB_GRPC_PRESHARED_KEY}
    command: serve 
    ports:
      - "50051:50051"
      - "50052:50052"
      - "9090:9090" 
  pronghorn-api:
    container_name: prong_api
    build:
      context: .
      dockerfile: production.prongapi.containerfile
    environment:
      SECRET_KEY: ${SECRET_KEY}
      VALKEY_HOST: ${VALKEY_HOST}
      VALKEY_PASS: ${VALKEY_PASS}
      AWS_ENDPOINT_URL_S3: ${AWS_ENDPOINT_URL_S3}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS} 
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      BUCKET_NAME: ${BUCKET_NAME}
      NUM_API_WORKERS: ${NUM_API_WORKERS}
      SESSION_REDIS: ${SESSION_REDIS}
      ORIGIN_URL: ${APPLICATION_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
    networks: 
      - pronghorn_app_network 
  valkey:
    container_name: prong_valkey
    image: docker.io/valkey/valkey:8.1.1
    healthcheck:
      test: valkey-cli ping || exit 1
    restart: always
    command: valkey-server --requirepass ${VALKEY_PASS}
    networks: 
      - pronghorn_app_network 
  web-app:
    container_name: prong_webapp
    build:
      context: .
      dockerfile: production.prongwebapp.containerfile
      args:
        - VITE_API_URL_ARG: ${VITE_API_URL}
    ports:
      - "80:80"
      - "443:443"
    networks: 
      - pronghorn_app_network
    volumes:
      - nginx_conf:/etc/nginx/
      - nginx_certs:/etc/ssl/

  # Postgres database, uncomment if not using external database host
  # db:
  #   container_name: postgres_container
  #   image: postgres
  #   restart: always
  #   environment:
  #     POSTGRES_USER: root
  #     POSTGRES_PASSWORD: $(DB_ROOT_PASS)
  #     POSTGRES_DB: annotation_db
  #   volumes:
  #     - $(DB_STORAGE):/var/lib/postgresql/data
  #   networks:
  #     - pronghorn_app_network
  #   ports:
  #     - "5432:5432"
  #   user: "999:999"

volumes:
  nginx_conf:
    external: true
  nginx_certs:
    external: true

networks: 
  pronghorn_app_network:
    driver: bridge
